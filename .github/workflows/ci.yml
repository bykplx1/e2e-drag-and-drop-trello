name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      # Report every engine independently: a WebKit failure must not hide a
      # passing Firefox run (or vice versa) and each uploads its own artifact.
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # The shared `setup` (auth) project has no browser configured, so it
        # runs on the default chromium and writes a portable storageState that
        # every engine reuses. Each matrix job therefore needs chromium (for
        # setup) plus its own engine. `install` de-dupes when they're equal.
        run: npx playwright install --with-deps chromium ${{ matrix.browser }}

      - name: Boot Focalboard
        run: docker compose up -d

      - name: Wait for Focalboard readiness
        # The 7.11.4 image has no curl/wget, so we poll the host-published port
        # directly. The compose healthcheck (bash /dev/tcp) is a second gate.
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8088/login || true)
            if [ "$code" = "200" ]; then echo "Focalboard ready"; exit 0; fi
            echo "waiting for Focalboard ($i): got '$code'"
            sleep 2
          done
          echo "Focalboard never became ready"; docker compose logs; exit 1

      - name: Run ${{ matrix.browser }} project
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload ${{ matrix.browser }} report + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Boot Focalboard
        run: docker compose up -d

      - name: Wait for Focalboard readiness
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8088/login || true)
            if [ "$code" = "200" ]; then echo "Focalboard ready"; exit 0; fi
            echo "waiting for Focalboard ($i): got '$code'"
            sleep 2
          done
          echo "Focalboard never became ready"; docker compose logs; exit 1

      - name: Run visual tests (chromium)
        run: npx playwright test --project=visual

      - name: Upload visual report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-report
          path: playwright-report/
          retention-days: 7
